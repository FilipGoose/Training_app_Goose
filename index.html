<title>Training App</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

/* PROGRAM TABS */
.tabs { display:flex; border-bottom:1px solid #334155; }
.tab { flex:1; text-align:center; padding:14px; background:#1e293b; cursor:pointer; }
.tab.active { background:#3b82f6; }

/* DAY TABS */
.day-tabs { display:flex; justify-content:center; gap:10px; margin:20px 0; }
.day-tab { padding:10px 18px; border-radius:12px; background:#e5e7eb; color:black; cursor:pointer; }
.day-tab.active { background:#1d4ed8; color:white; }

/* CONTENT */
.container { max-width:800px; margin:auto; padding:20px; }
.card { background:#1e293b; padding:20px; border-radius:20px; text-align:center; }

/* WORKOUT MODE */
.big { font-size:28px; margin:10px 0; }
small { color:#94a3b8; }
button { padding:10px 20px; margin:10px; border:none; border-radius:10px; cursor:pointer; }
</style>
</head>

/* UI */
function selectProgram(p){
  currentProgram = p;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[p-1].classList.add('active');
 window.onload = () => {
   console.log(programs);
  renderDays();
};
}

function renderDays(){
  const daysDiv = document.getElementById('days');
  daysDiv.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'day-tabs';

  const days = Object.keys(programs[currentProgram]);

  days.forEach((d,i)=>{
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (i===0 ? ' active':'');
    tab.textContent = 'DAG ' + d;

    tab.onclick = ()=>{
      document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      loadDay(d);
    };

    wrapper.appendChild(tab);
  });

  daysDiv.appendChild(wrapper);
  loadDay(days[0]);
}

function loadDay(day){
  currentWorkout = programs[currentProgram][day];
  index = 0;
  renderWorkout();
}

function renderWorkout(){
  const ex = currentWorkout[index];
  const container = document.getElementById('workout');

  if(!ex){
    container.innerHTML = "<h2>Færdig 🎉</h2>";
    return;
  }

  container.innerHTML = `
    <div class="big"><strong>${ex.name}</strong></div>
    <div class="big">${ex.reps}</div>
    <small>${ex.desc || ""}</small>
    <br>
    <button onclick="prev()">⬅️</button>
    <button onclick="next()">➡️</button>
  `;
}

function next(){ index++; renderWorkout(); }
function prev(){ if(index>0){ index--; renderWorkout(); } }

renderDays();
</script>
