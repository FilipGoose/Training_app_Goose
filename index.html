let currentProgram = 1;

let currentIndex = 0;

function selectTab(p){
  currentProgram = p;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[p-1].classList.add('active');
  renderDays();
}

function renderDays(){
  const daysDiv = document.getElementById('days');
  daysDiv.innerHTML = '';

  const wrapper = document.createElement('div');
  wrapper.className = 'day-tabs';

  const days = Object.keys(programs[currentProgram]);

  days.forEach((d, i)=>{
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (i===0 ? ' active' : '');
    tab.innerText = 'Dag ' + d;

    tab.onclick = ()=>{
      document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      loadDay(d);
    };

    wrapper.appendChild(tab);
  });

  daysDiv.appendChild(wrapper);

  // load first day automatically
  loadDay(days[0]);
};

  daysDiv.appendChild(wrapper);

  // auto load first day
  const firstDay = Object.keys(programs[currentProgram])[0];
  loadDay(firstDay);
});
}

function loadDay(day){
  currentWorkout = programs[currentProgram][day].filter(e => !e.section);
  currentIndex = 0;
  renderWorkoutMode();
}

function renderWorkoutMode(){
  const container = document.getElementById('workout');
  const ex = currentWorkout[currentIndex];

  if(!ex){
    container.innerHTML = '<h2>Workout færdig 🎉</h2>';
    return;
  }

  container.innerHTML = `
    <div class="workout-mode">
      <div class="big"><strong>${ex.name}</strong></div>
      <div class="big">${ex.reps}</div>
      <small>${ex.desc || ""}</small>
      <br><br>
      <button onclick="prevExercise()">⬅️</button>
      <button onclick="nextExercise()">➡️</button>
    </div>
  `;
}

function nextExercise(){ currentIndex++; renderWorkoutMode(); }
function prevExercise(){ if(currentIndex>0){ currentIndex--; renderWorkoutMode(); }}
