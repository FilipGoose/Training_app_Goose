<title>Trænings App PRO</title>
<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; margin:0; background:#0f172a; color:white; }
.tabs { display:flex; border:1px solid #475569; margin:10px; }
.tab { flex:1; padding:12px; text-align:center; cursor:pointer; background:#1e293b; font-size:12px; }
.tab.active { background:#3b82f6; }
.container { padding:10px; max-width:900px; margin:auto; }
.card { background:#1e293b; padding:12px; border-radius:16px; margin-bottom:10px; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; }

.workout-mode { text-align:center; }
.big { font-size:28px; margin:15px 0; }
small { color:#94a3b8; }
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="selectTab(1)">P1</div>
  <div class="tab" onclick="selectTab(2)">P2</div>
  <div class="tab" onclick="selectTab(3)">P3</div>
  <div class="tab" onclick="selectTab(4)">P4</div>
  <div class="tab" onclick="selectTab(5)">ABS</div>
</div>

<div class="container">
  <div class="card" id="days"></div>
  <div class="card" id="workout"></div>
</div>

<script>
let currentProgram = 1;
let currentWorkout = [];
let currentIndex = 0;

function selectTab(p){
  currentProgram = p;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab')[p-1].classList.add('active');
  renderDays();
}

function renderDays(){
  const daysDiv = document.getElementById('days');
  daysDiv.innerHTML = '<h3>Vælg Dag</h3>';
  Object.keys(programs[currentProgram]).forEach(d=>{
    const btn = document.createElement('button');
    btn.innerText = 'Dag ' + d;
    btn.onclick = ()=>loadDay(d);
    daysDiv.appendChild(btn);
  });
}

function loadDay(day){
  currentWorkout = programs[currentProgram][day].filter(e => !e.section);
  currentIndex = 0;
  renderWorkoutMode();
}

function renderWorkoutMode(){
  const container = document.getElementById('workout');
  const ex = currentWorkout[currentIndex];

  if(!ex){
    container.innerHTML = '<h2>Workout færdig 🎉</h2>';
    return;
  }

  container.innerHTML = `
    <div class="workout-mode">
      <div class="big"><strong>${ex.name}</strong></div>
      <div class="big">${ex.reps}</div>
      <small>${ex.desc || ""}</small>
      <br><br>
      <button onclick="prevExercise()">⬅️</button>
      <button onclick="nextExercise()">➡️</button>
    </div>
  `;
}

function nextExercise(){ currentIndex++; renderWorkoutMode(); }
function prevExercise(){ if(currentIndex>0){ currentIndex--; renderWorkoutMode(); }}
