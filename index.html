<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trænings App PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body { font-family: Arial; margin:0; background:#0f172a; color:white; }
header { padding:20px; text-align:center; font-size:22px; font-weight:bold; }
.container { padding:15px; max-width:900px; margin:auto; }
.card { background:#1e293b; padding:15px; border-radius:16px; margin-bottom:15px; }
button { padding:10px; margin:5px; border:none; border-radius:10px; cursor:pointer; }
.btn { background:#3b82f6; color:white; }
.btn-secondary { background:#475569; color:white; }
.exercise { padding:10px; border-bottom:1px solid #334155; display:flex; gap:10px; align-items:center; }
.exercise img { width:65px; height:65px; border-radius:8px; object-fit:cover; }
.exercise-content { flex:1; }
.section { margin-top:15px; font-weight:bold; color:#93c5fd; }
.done { text-decoration:line-through; opacity:0.6; }
input { width:60px; padding:5px; border-radius:6px; border:none; }
.timer { font-size:18px; margin-top:10px; }
</style>
</head>
<body>

<header>🏋️ Trænings App PRO</header>

<div class="container">

<div class="card">
<h3>Vælg Program</h3>
<button class="btn" onclick="selectProgram(4)">Program 4 (Bodyweight)</button>
<button class="btn" onclick="selectProgram(5)">ABS</button>
</div>

<div class="card" id="days" style="display:none;">
<h3>Vælg Dag</h3>
<div id="dayButtons"></div>
</div>

<div class="card" id="workout"></div>
<div class="card timer" id="timer"></div>

</div>

<script>

let currentProgram = null;
let timerInterval;

function startTimer(seconds){
clearInterval(timerInterval);
let time = seconds;
const el = document.getElementById('timer');
el.innerText = "Rest: " + time + "s";

timerInterval = setInterval(()=>{
time--;
el.innerText = "Rest: " + time + "s";
if(time <= 0){
clearInterval(timerInterval);
el.innerText = "GO 🔥";
}
},1000);
}

const programs = {

4:{
1:[
{section:"AMRAP 1"},
{name:"Air Squat", reps:"15", img:"images/squat.png"},
{name:"Sit Up", reps:"10", img:"images/situp.png"},
{name:"Push Ups", reps:"5", img:"images/pushup.png"},

{section:"AMRAP 2"},
{name:"Reverse Lunge", reps:"10", img:"images/lunge.png"},
{name:"Plank Knee Elbow", reps:"8", img:"images/core.png"},
{name:"Inverted Row", reps:"6", img:"images/row.png"}
],

2:[
{section:"20min AMRAP"},
{name:"Bulgarian Split Squat", reps:"10", img:"images/bulgarian.png"},
{name:"Walkout Pushup", reps:"5", img:"images/pushup.png"},
{name:"Jackknife Crunch", reps:"10", img:"images/core.png"},
{name:"Down Ups", reps:"5", img:"images/burpee.png"}
],

3:[
{section:"Dirty 30"},
{name:"Burpee", reps:"30", img:"images/burpee.png"},
{name:"V-Sit", reps:"30", img:"images/core.png"},
{name:"Jump Squat", reps:"30", img:"images/squat.png"},
{name:"Push Ups", reps:"30", img:"images/pushup.png"}
],

4:[
{section:"Ladder"},
{name:"Burpee", reps:"10-1", img:"images/burpee.png"},
{name:"Dips", reps:"20-2", img:"images/dips.png"},
{name:"Sit Ups", reps:"30-3", img:"images/situp.png"}
],

5:[
{section:"25 Rounds"},
{name:"Air Squat", reps:"3", img:"images/squat.png"},
{name:"Jump Lunge", reps:"4", img:"images/lunge.png"},
{name:"Push Ups", reps:"5", img:"images/pushup.png"}
]
},

5:{
1:[
{section:"Core Supersets"},
{name:"Crunch", reps:"20s", img:"images/core.png"},
{name:"Plank Knee Elbow", reps:"20s", img:"images/core.png"},
{name:"Leg Raise", reps:"20s", img:"images/core.png"},
{name:"Plank Arm Wipe", reps:"20s", img:"images/core.png"}
],

2:[
{section:"Core"},
{name:"Sit Up", reps:"30", img:"images/situp.png"},
{name:"Mountain Climber", reps:"30", img:"images/core.png"},
{name:"Toe Touch", reps:"10-20", img:"images/core.png"},
{name:"Side Plank", reps:"20-40s", img:"images/core.png"}
],

3:[
{section:"Core"},
{name:"Atomic Situp", reps:"8-12", img:"images/core.png"},
{name:"Plank Taps", reps:"8-12", img:"images/core.png"},
{name:"Hip Thrust", reps:"8-12", img:"images/core.png"},
{name:"Hollow Hold", reps:"10-20s", img:"images/core.png"}
]
}
};

function selectProgram(p){
currentProgram = p;
document.getElementById('days').style.display = 'block';

const btns = document.getElementById('dayButtons');
btns.innerHTML = '';

Object.keys(programs[p]).forEach(d=>{
const b = document.createElement('button');
b.className = 'btn-secondary';
b.innerText = 'Dag ' + d;
b.onclick = ()=>loadDay(d);
btns.appendChild(b);
});
}

function loadDay(day){
const workout = programs[currentProgram][day];
const container = document.getElementById('workout');

container.innerHTML = `<h3>Dag ${day}</h3>`;

workout.forEach(ex=>{

if(ex.section){
const s = document.createElement('div');
s.className = 'section';
s.innerText = ex.section;
container.appendChild(s);
return;
}

const div = document.createElement('div');
div.className = 'exercise';

const check = document.createElement('input');
check.type = 'checkbox';

const img = document.createElement('img');
img.src = ex.img;

const content = document.createElement('div');
content.className = 'exercise-content';
content.innerHTML = `<strong>${ex.name}</strong><br>${ex.reps}`;

const input = document.createElement('input');
input.placeholder = 'Reps';

input.value = localStorage.getItem(ex.name) || "";
input.onchange = ()=>localStorage.setItem(ex.name, input.value);

check.onclick = ()=>content.classList.toggle('done');

const restBtn = document.createElement('button');
restBtn.innerText = '⏱';
restBtn.onclick = ()=>startTimer(60);

div.appendChild(check);
div.appendChild(img);
div.appendChild(content);
div.appendChild(input);
div.appendChild(restBtn);

container.appendChild(div);

});
}

// Service worker
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
